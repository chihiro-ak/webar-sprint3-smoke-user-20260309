<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: targets.mind; smoothing: true; filterMinCF:0.0001; filterBeta: 0.001"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="alpha: true; preserveDrawingBuffer: true"
>
  <a-entity light="type: ambient; intensity: 1"></a-entity>

  <a-entity id="target0" mindar-image-target="targetIndex: 0">
    <a-plane
      id="videoPlane"
      material="shader: flat; src: #video1; transparent: true"
      width="1"
      height="1"
      position="0 0.05 0.05"
      scale="1.1 1.1 1"
    ></a-plane>
  </a-entity>

  <a-camera active='true' position='0 0 0'></a-camera>
</a-scene>

<button id="captureButton"></button>
<canvas id="captureCanvas" style="display:none;"></canvas>

</body>
</html>
